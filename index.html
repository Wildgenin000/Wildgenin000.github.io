<!DOCTYPE html>
<html lang="ro" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Listă de sarcini • Completă</title>
  
  <!-- Foundation CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/css/foundation.min.css">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    /* Variabile și stiluri globale */
    :root {
      --bg-gradient-start: #f4f9fc;
      --bg-gradient-end: #e3f0f7;
      --card-bg: rgba(255, 255, 255, 0.9);
      --text-primary: #1e3a4d;
      --text-secondary: #3c6478;
      --accent: #0f6b7c;
      --accent-light: #d0e8f0;
      --border-light: #cbdbe6;
      --task-bg: #ffffff;
      --task-completed-bg: #ecf6f9;
      --shadow: 0 12px 28px rgba(0, 20, 30, 0.08);
      --checkbox-accent: #1a7f6b;
      --delete-hover: #fce8e6;
      --delete-color: #b53b3b;
      --progress-bg: #d0e8f0;
      --progress-fill: #0f6b7c;
    }

    .dark {
      --bg-gradient-start: #16242e;
      --bg-gradient-end: #0f1a22;
      --card-bg: rgba(25, 38, 48, 0.9);
      --text-primary: #e0ecf5;
      --text-secondary: #b0cadc;
      --accent: #2f9bb3;
      --accent-light: #1a3e4c;
      --border-light: #2c4858;
      --task-bg: #1f313d;
      --task-completed-bg: #1a3a3f;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
      --checkbox-accent: #2aa58b;
      --delete-hover: #4e2a2a;
      --delete-color: #e66565;
      --progress-bg: #1a3e4c;
      --progress-fill: #2f9bb3;
    }

    body {
      background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      transition: background 0.3s ease;
    }

    .todo-container { max-width: 580px; width: 100%; }

    .todo-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 40px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 2rem 1.8rem;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .dark .todo-card { border-color: rgba(80, 110, 130, 0.2); }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.8rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border-light);
    }

    .title-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .check-icon {
      background: var(--accent);
      width: 46px;
      height: 46px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.8rem;
      font-weight: 500;
      box-shadow: 0 6px 12px rgba(15, 107, 124, 0.2);
    }

    h1 {
      font-size: 2rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin: 0;
    }

    .dark-toggle {
      background: var(--accent-light);
      border: none;
      border-radius: 40px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--text-primary);
      transition: 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .dark-toggle:hover { background: var(--accent); color: white; }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 1.5rem;
      align-items: flex-start;
    }

    #taskInput {
      flex: 1;
      resize: none;
      overflow-y: hidden;
      min-height: 58px;
      padding: 1rem 1.3rem;
      border-radius: 30px !important;
      border: 2px solid var(--border-light) !important;
      background: var(--task-bg);
      color: var(--text-primary);
      font-size: 1rem;
      line-height: 1.5;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.02) !important;
      transition: border 0.2s, box-shadow 0.2s;
      margin: 0;
    }

    #taskInput:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(15, 107, 124, 0.2), inset 0 1px 3px rgba(0,0,0,0.02) !important;
      outline: none;
    }

    #taskInput::placeholder { color: #7e9aab; opacity: 0.7; }
    .dark #taskInput::placeholder { color: #8ea9bb; }

    .add-btn {
      background: var(--accent) !important;
      color: white !important;
      border-radius: 40px !important;
      width: 58px;
      height: 58px;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      box-shadow: 0 8px 16px rgba(15, 107, 124, 0.2);
      transition: 0.15s;
      margin: 0;
      line-height: 1;
    }

    .add-btn i { font-size: 24px; }
    .add-btn:hover { background: #0a5665 !important; transform: scale(1.02); box-shadow: 0 10px 20px rgba(15, 107, 124, 0.3); }

    /* Bară de progres */
    .progress-container { margin-bottom: 1rem; }
    .progress-bar {
      height: 6px;
      background: var(--progress-bg);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--progress-fill);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Filtrare */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent;
      border: 1.5px solid var(--border-light);
      color: var(--text-secondary);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .filter-btn:hover:not(.active) {
      background: var(--accent-light);
      border-color: var(--accent);
    }

    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
      gap: 1rem;
    }

    #taskCount {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      letter-spacing: 0.01em;
      border: 1px solid rgba(15, 107, 124, 0.15);
    }

    .dark #taskCount { color: #c4e2f0; border-color: rgba(47, 155, 179, 0.3); }

    .clear-btn {
      background: transparent;
      border: 1.5px solid var(--border-light);
      color: var(--text-secondary);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
    }

    .clear-btn i { margin-right: 6px; }
    .clear-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    .task-list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 1rem 1.2rem;
      background: var(--task-bg);
      border-radius: 24px;
      margin-bottom: 10px;
      border: 1px solid var(--border-light);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
      transition: all 0.2s;
      animation: fadeSlide 0.2s ease;
    }

    .task-item:hover { border-color: var(--accent); box-shadow: 0 6px 14px rgba(15, 107, 124, 0.08); }
    .task-item.completed { background: var(--task-completed-bg); border-color: rgba(15, 107, 124, 0.25); opacity: 0.9; }

    .task-checkbox {
      width: 24px;
      height: 24px;
      accent-color: var(--checkbox-accent);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .task-content {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-primary);
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.45;
      cursor: pointer;
    }

    .task-item.completed .task-content { text-decoration: line-through; color: #6b8a9a; }
    .dark .task-item.completed .task-content { color: #9ab5c7; }

    /* Stiluri îmbunătățite pentru editare inline */
    .task-edit-input {
      flex: 1;
      padding: 0.3rem 0.5rem;
      margin: 0;
      border: 1px solid var(--accent);
      background: #ffffff !important;   /* fundal alb forțat */
      color: #1e3a4d !important;        /* text negru-închis forțat */
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.45;
      font-family: inherit;
      resize: none;
      overflow-y: hidden;
      word-break: break-word;
      white-space: pre-wrap;
      outline: none;
      border-radius: 12px;
      box-shadow: 0 0 0 2px rgba(15, 107, 124, 0.1);
    }

    .task-edit-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 107, 124, 0.2);
    }

    .task-delete {
      background: none;
      border: none;
      color: #8da6b5;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 30px;
      transition: 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }

    .task-delete:hover { background: var(--delete-hover); color: var(--delete-color); }

    .empty-message {
      text-align: center;
      padding: 2.5rem 1.5rem;
      color: #7e9aab;
      font-style: italic;
      background: rgba(210, 230, 240, 0.3);
      border-radius: 40px;
      border: 2px dashed #b2cedb;
      font-weight: 500;
    }

    .dark .empty-message { background: rgba(30, 50, 65, 0.4); border-color: #2e5768; color: #a3c0d1; }

    .footer-note {
      margin-top: 1.8rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .task-list::-webkit-scrollbar { width: 5px; }
    .task-list::-webkit-scrollbar-track { background: var(--accent-light); border-radius: 10px; }
    .task-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-box {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 32px;
      max-width: 400px;
      width: 90%;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
    }

    .modal-box h3 { margin-top: 0; color: var(--text-primary); }
    .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 1.5rem; }
    .modal-btn {
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    .modal-btn.cancel { background: transparent; border: 1px solid var(--border-light); color: var(--text-secondary); }
    .modal-btn.confirm { background: var(--accent); color: white; }

    /* Toast pentru Undo */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 2000;
      animation: slideUp 0.3s ease;
    }
    .toast button {
      background: var(--accent);
      border: none;
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    .button { margin: 0; }
    .grid-container { padding: 0; }
  </style>
</head>
<body>

<div class="todo-container">
  <div class="todo-card">
    
    <!-- Header -->
    <div class="app-header">
      <div class="title-section">
        <div class="check-icon">✓</div>
        <h1>Listă de sarcini</h1>
      </div>
      <button id="darkModeToggle" class="dark-toggle" aria-label="Comută mod întunecat">
        <i class="fas fa-moon"></i>
      </button>
    </div>

    <!-- Input -->
    <div class="input-group">
      <textarea id="taskInput" placeholder="Scrie o sarcină nouă… (Ctrl+Enter pentru adăugare)" rows="1" autocomplete="off"></textarea>
      <button id="addTaskBtn" class="add-btn" aria-label="Adaugă sarcină">
        <i class="fas fa-plus"></i>
      </button>
    </div>

    <!-- Bară de progres -->
    <div class="progress-container">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
      </div>
    </div>

    <!-- Filtrare -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">Toate</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Finalizate</button>
    </div>

    <!-- Stats + clear -->
    <div class="stats-bar">
      <span id="taskCount">0 sarcini</span>
      <button id="clearCompletedBtn" class="clear-btn">
        <i class="fas fa-trash-alt"></i> Șterge finalizate
      </button>
    </div>

    <!-- Task list -->
    <ul id="taskList" class="task-list"></ul>

    <div class="footer-note">
      <i class="fas fa-save"></i> salvare automată · Ctrl+Enter · dublu-click pentru editare
    </div>
  </div>
</div>

<!-- Regiune live pentru screen readers -->
<div id="liveAnnouncer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<!-- Modal de confirmare -->
<div id="confirmModal" class="modal-overlay" style="display: none;">
  <div class="modal-box">
    <h3 id="modalTitle">Confirmare</h3>
    <p id="modalMessage">Ești sigur că vrei să ștergi această sarcină?</p>
    <div class="modal-buttons">
      <button class="modal-btn cancel" id="modalCancel">Anulează</button>
      <button class="modal-btn confirm" id="modalConfirm">Șterge</button>
    </div>
  </div>
</div>

<!-- Toast pentru Undo -->
<div id="undoToast" class="toast" style="display: none;">
  <span id="toastMessage">Sarcină ștearsă</span>
  <button id="undoButton">Undo</button>
</div>

<script>
  (function(){
    "use strict";

    // ---------- Dark Mode ----------
    const html = document.documentElement;
    const darkToggle = document.getElementById('darkModeToggle');
    const DARK_KEY = 'todo_foundation_dark';

    function setDarkMode(isDark) {
      if (isDark) {
        html.classList.add('dark');
        darkToggle.innerHTML = '<i class="fas fa-sun"></i>';
      } else {
        html.classList.remove('dark');
        darkToggle.innerHTML = '<i class="fas fa-moon"></i>';
      }
      localStorage.setItem(DARK_KEY, isDark);
    }

    const savedDark = localStorage.getItem(DARK_KEY);
    if (savedDark !== null) {
      setDarkMode(savedDark === 'true');
    } else {
      setDarkMode(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
    darkToggle.addEventListener('click', () => setDarkMode(!html.classList.contains('dark')));

    // ---------- Elemente DOM ----------
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addTaskBtn');
    const taskList = document.getElementById('taskList');
    const taskCountSpan = document.getElementById('taskCount');
    const clearCompletedBtn = document.getElementById('clearCompletedBtn');
    const liveAnnouncer = document.getElementById('liveAnnouncer');
    const progressFill = document.getElementById('progressFill');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const undoToast = document.getElementById('undoToast');
    const toastMessage = document.getElementById('toastMessage');
    const undoButton = document.getElementById('undoButton');

    // Modal
    const modal = document.getElementById('confirmModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalCancel = document.getElementById('modalCancel');
    const modalConfirm = document.getElementById('modalConfirm');

    // Stare
    let tasks = [];
    let currentFilter = 'all';
    let pendingAction = null;
    let undoData = null;
    const STORAGE_KEY = 'todo_foundation_app';

    // ---------- Debounced auto‑resize ----------
    let resizeScheduled = false;
    function autoResizeTextarea() {
      if (resizeScheduled) return;
      resizeScheduled = true;
      requestAnimationFrame(() => {
        taskInput.style.height = 'auto';
        taskInput.style.height = taskInput.scrollHeight + 'px';
        resizeScheduled = false;
      });
    }
    taskInput.addEventListener('input', autoResizeTextarea);
    window.addEventListener('DOMContentLoaded', autoResizeTextarea);

    function announce(message) { liveAnnouncer.textContent = message; }

    // ---------- Gestionare sarcini ----------
    function loadTasks() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try { tasks = JSON.parse(stored) || []; } catch(e) { tasks = []; }
      } else {
        tasks = [
          { id: Date.now() - 100000, text: '✨ Bun venit în aplicația ta de sarcini!', completed: false },
          { id: Date.now() - 200000, text: '✔️ Poți scrie pe mai multe rânduri\nîn această textare inteligentă.', completed: true },
          { id: Date.now() - 300000, text: '🌙 Încearcă și modul întunecat — butonul din dreapta sus.', completed: false },
          { id: Date.now() - 400000, text: '📊 Bara de progres și filtrele sunt aici!', completed: false },
        ];
      }
    }

    function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

    function getFilteredTasks() {
      if (currentFilter === 'active') return tasks.filter(t => !t.completed);
      if (currentFilter === 'completed') return tasks.filter(t => t.completed);
      return tasks;
    }

    function updateProgress() {
      const total = tasks.length;
      if (total === 0) { progressFill.style.width = '0%'; return; }
      const completed = tasks.filter(t => t.completed).length;
      progressFill.style.width = (completed / total) * 100 + '%';
    }

    function updateCount() {
      const remaining = tasks.filter(t => !t.completed).length;
      const total = tasks.length;
      taskCountSpan.textContent = total === 0 ? '0 sarcini' : `${remaining} de făcut · ${total} total`;
    }

    function render() {
      const filtered = getFilteredTasks();
      taskList.innerHTML = '';

      if (filtered.length === 0) {
        const emptyLi = document.createElement('li');
        emptyLi.className = 'empty-message';
        emptyLi.textContent = currentFilter === 'all' ? '✨ Nicio sarcină. Adaugă una nouă!' :
                             currentFilter === 'active' ? '🎯 Nicio sarcină activă.' :
                             '✅ Nicio sarcină finalizată.';
        taskList.appendChild(emptyLi);
      } else {
        const sorted = [...filtered].sort((a,b) => a.completed - b.completed);
        sorted.forEach(task => {
          const li = document.createElement('li');
          li.dataset.id = task.id;
          li.className = `task-item ${task.completed ? 'completed' : ''}`;

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'task-checkbox';
          checkbox.checked = task.completed;
          checkbox.setAttribute('aria-label', `Marchează "${task.text}" ca finalizat`);

          const content = document.createElement('span');
          content.className = 'task-content';
          content.textContent = task.text;
          content.setAttribute('title', 'Dublu-click pentru editare');

          const delBtn = document.createElement('button');
          delBtn.className = 'task-delete';
          delBtn.innerHTML = '<i class="fas fa-times"></i>';
          delBtn.dataset.id = task.id;
          delBtn.setAttribute('aria-label', `Șterge sarcina: ${task.text}`);

          li.appendChild(checkbox);
          li.appendChild(content);
          li.appendChild(delBtn);
          taskList.appendChild(li);
        });
      }

      updateCount();
      updateProgress();
    }

    // ---------- Operații CRUD ----------
    function addTask(text) {
      const trimmed = text.trim();
      if (!trimmed) {
        taskInput.style.borderColor = '#d66';
        setTimeout(() => taskInput.style.borderColor = '', 300);
        return;
      }
      tasks.push({ id: Date.now() + Math.random(), text: trimmed, completed: false });
      saveTasks();
      render();
      taskInput.value = '';
      autoResizeTextarea();
      taskInput.focus();
      announce(`Sarcina "${trimmed}" a fost adăugată.`);
    }

    function toggleTask(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (task) {
        task.completed = !task.completed;
        saveTasks();
        render();
        announce(`Sarcina "${task.text}" a fost ${task.completed ? 'finalizată' : 'marcată ca nefinalizată'}.`);
      }
    }

    function deleteTask(taskId, skipUndo = false) {
      const taskIndex = tasks.findIndex(t => t.id === taskId);
      if (taskIndex === -1) return;
      const task = tasks[taskIndex];
      
      if (!skipUndo) {
        undoData = { tasks: [task], type: 'delete' };
        showUndoToast(`Sarcina "${task.text}" a fost ștearsă.`);
      }
      
      tasks.splice(taskIndex, 1);
      saveTasks();
      render();
      announce(`Sarcina "${task.text}" a fost ștearsă.`);
    }

    function clearCompleted(skipUndo = false) {
      const completedTasks = tasks.filter(t => t.completed);
      if (completedTasks.length === 0) {
        announce('Nu există sarcini finalizate de șters.');
        return;
      }
      
      if (!skipUndo) {
        undoData = { tasks: [...completedTasks], type: 'clear' };
        showUndoToast(`${completedTasks.length} sarcini finalizate au fost șterse.`);
      }
      
      tasks = tasks.filter(t => !t.completed);
      saveTasks();
      render();
      announce(`${completedTasks.length} sarcini finalizate au fost șterse.`);
    }

    // ---------- Undo ----------
    let undoTimeout = null;
    function showUndoToast(message) {
      toastMessage.textContent = message;
      undoToast.style.display = 'flex';
      if (undoTimeout) clearTimeout(undoTimeout);
      undoTimeout = setTimeout(() => {
        undoToast.style.display = 'none';
        undoData = null;
      }, 5000);
    }

    function performUndo() {
      if (!undoData) return;
      if (undoData.type === 'delete') {
        undoData.tasks.forEach(task => tasks.push(task));
        announce('Ștergerea a fost anulată.');
      } else if (undoData.type === 'clear') {
        undoData.tasks.forEach(task => tasks.push(task));
        announce('Ștergerea finalizatelor a fost anulată.');
      }
      saveTasks();
      render();
      undoToast.style.display = 'none';
      undoData = null;
      if (undoTimeout) clearTimeout(undoTimeout);
    }

    // ---------- Editare inline (cu fundal alb și text negru) ----------
    function startEditing(taskElement, taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      
      const contentSpan = taskElement.querySelector('.task-content');
      const currentText = task.text;
      
      const input = document.createElement('textarea');
      input.className = 'task-edit-input';
      input.value = currentText;
      input.rows = 1;
      
      const autoResizeEdit = () => {
        input.style.height = 'auto';
        input.style.height = input.scrollHeight + 'px';
      };
      
      contentSpan.replaceWith(input);
      autoResizeEdit();
      input.focus();
      
      const saveEdit = () => {
        const newText = input.value.trim();
        if (newText && newText !== currentText) {
          task.text = newText;
          saveTasks();
          render();
          announce(`Sarcina a fost editată în "${newText}".`);
        } else {
          render();
        }
      };
      
      input.addEventListener('blur', saveEdit);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          saveEdit();
        }
        if (e.key === 'Escape') {
          render();
        }
      });
      
      input.addEventListener('input', autoResizeEdit);
    }

    // ---------- Modal logic ----------
    function showModal(title, message, onConfirm) {
      modalTitle.textContent = title;
      modalMessage.textContent = message;
      pendingAction = onConfirm;
      modal.style.display = 'flex';
    }

    function hideModal() {
      modal.style.display = 'none';
      pendingAction = null;
    }

    // ---------- Sincronizare între tab‑uri ----------
    window.addEventListener('storage', (e) => {
      if (e.key === STORAGE_KEY) {
        loadTasks();
        render();
        announce('Lista a fost actualizată dintr-un alt tab.');
      }
    });

    // ---------- Event listeners ----------
    addBtn.addEventListener('click', () => addTask(taskInput.value));

    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        addTask(taskInput.value);
      }
    });

    taskList.addEventListener('change', (e) => {
      if (e.target.classList.contains('task-checkbox')) {
        const li = e.target.closest('.task-item');
        if (li) toggleTask(Number(li.dataset.id));
      }
    });

    taskList.addEventListener('click', (e) => {
      const deleteBtn = e.target.closest('.task-delete');
      if (deleteBtn && deleteBtn.dataset.id) {
        e.preventDefault();
        const taskId = Number(deleteBtn.dataset.id);
        const task = tasks.find(t => t.id === taskId);
        if (task) {
          showModal('Șterge sarcina', `Ești sigur că vrei să ștergi sarcina "${task.text}"?`, () => deleteTask(taskId));
        }
        return;
      }
    });

    taskList.addEventListener('dblclick', (e) => {
      const content = e.target.closest('.task-content');
      if (content) {
        const li = content.closest('.task-item');
        if (li) {
          const taskId = Number(li.dataset.id);
          startEditing(li, taskId);
        }
      }
    });

    clearCompletedBtn.addEventListener('click', () => {
      const completedCount = tasks.filter(t => t.completed).length;
      if (completedCount === 0) {
        announce('Nu există sarcini finalizate de șters.');
        return;
      }
      showModal('Șterge sarcinile finalizate', `Ești sigur că vrei să ștergi toate cele ${completedCount} sarcini finalizate?`, () => clearCompleted());
    });

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
        announce(`Filtru: ${btn.textContent}`);
      });
    });

    undoButton.addEventListener('click', performUndo);

    modalCancel.addEventListener('click', hideModal);
    modalConfirm.addEventListener('click', () => {
      if (pendingAction) pendingAction();
      hideModal();
    });
    modal.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.style.display === 'flex') hideModal();
    });

    // ---------- Inițializare ----------
    loadTasks();
    render();
    taskInput.focus();
  })();
</script>

<!-- Foundation JS -->
<script src="https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/js/foundation.min.js"></script>
